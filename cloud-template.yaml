apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: fzsmphone
spec:
  description: >-
    iOS-style phone simulator web app for immersive social RP.
    AI-powered chat, social, entertainment, lifestyle & tools — 45+ pages.
icon: https://raw.githubusercontent.com/Xeltra233/fzsmphone/master/public/icon.svg
  template: GIT
  domainKey: PUBLIC_DOMAIN
  dependencies:
  - PostgreSQL
  spec:
  source:
    source: GITHUB
    repo: Xeltra233/fzsmphone
          branch: master
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          PORT:
            default: "8080"
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          JWT_SECRET:
            default: ${JWT_SECRET}
          DISCORD_CLIENT_ID:
            default: ${DISCORD_CLIENT_ID}
          DISCORD_CLIENT_SECRET:
            default: ${DISCORD_CLIENT_SECRET}
          DISCORD_REDIRECT_URI:
            default: ${DISCORD_REDIRECT_URI}
          FRONTEND_URL:
            default: https://${PUBLIC_DOMAIN}
          ENVIRONMENT:
            default: production
  localization:
    zh-CN:
      description: >-
        高仿 iOS 风格手机模拟器 Web 应用，专为角色扮演和沉浸式社交模拟打造。
        集成 AI 生成内容，覆盖聊天、社交、娱乐、生活、工具五大模块，45+ 功能页面。
      readme: |-
        # fzsmphone

        高仿 iOS 风格手机模拟器 Web 应用，专为角色扮演和沉浸式社交模拟打造。

        ## 特性

        - iOS 风格 UI，45+ 功能页面
        - AI 驱动内容生成（OpenAI 兼容 API）
        - Discord OAuth2 身份验证
        - 五大模块：聊天、社交、娱乐、生活、工具

        ## 技术栈

        - 前端：Vue 3 + TypeScript + Vite + Pinia
        - 后端：Go 1.22 + Chi v5 + PostgreSQL 16
        - 认证：Discord OAuth2 + JWT

        ## 部署后配置

        1. 在 [Discord Developer Portal](https://discord.com/developers/applications) 创建应用
2. 将 OAuth2 Redirect URI 设置為 `https://your-domain.com/auth/callback`
  3. 在环境变量中填入 Discord 相關配置

  更多信息：[GitHub 仓库](https://github.com/Xeltra233/fzsmphone)
