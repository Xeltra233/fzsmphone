apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: fzsmphone
spec:
  description: >-
    iOS-style phone simulator web app for immersive social RP.
    AI-powered chat, social, entertainment, lifestyle & tools — 45+ pages.
  icon: https://raw.githubusercontent.com/907606864-hub/fzsmphone/master/public/icon.svg
  tags:
    - Tool
    - Entertainment
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for your fzsmphone instance
    - key: JWT_SECRET
      type: STRING
      name: JWT Secret
      description: Secret key used to sign JWT tokens (use a long random string)
    - key: DISCORD_CLIENT_ID
      type: STRING
      name: Discord Client ID
      description: Your Discord OAuth2 application Client ID
    - key: DISCORD_CLIENT_SECRET
      type: STRING
      name: Discord Client Secret
      description: Your Discord OAuth2 application Client Secret
    - key: DISCORD_REDIRECT_URI
      type: STRING
      name: Discord Redirect URI
      description: Discord OAuth callback URL
  readme: |-
    # fzsmphone

    iOS-style phone simulator web app for immersive social RP.

    ## Features

    - iOS-style UI with 45+ pages
    - AI-powered content generation (OpenAI compatible API)
    - Discord OAuth2 authentication
    - Five modules: Chat, Social, Entertainment, Lifestyle, Tools

    ## Tech Stack

    - Frontend: Vue 3 + TypeScript + Vite + Pinia
    - Backend: Go 1.22 + Chi v5 + PostgreSQL 16
    - Auth: Discord OAuth2 + JWT

    ## Post-deploy Configuration

    1. Create an app at [Discord Developer Portal](https://discord.com/developers/applications)
    2. Set OAuth2 Redirect URI to `https://your-domain.zeabur.app/auth/callback`
    3. Fill in Discord configuration in Zeabur environment variables

    More info: [GitHub](https://github.com/907606864-hub/fzsmphone)
  services:
    # ---------- PostgreSQL ----------
    - name: PostgreSQL
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:16-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: fzsmphone
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_DB:
            default: fzsmphone
            expose: true
          POSTGRES_CONNECTION_STRING:
            default: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true

    # ---------- fzsmphone (App) ----------
    - name: fzsmphone
      icon: https://raw.githubusercontent.com/907606864-hub/fzsmphone/master/public/icon.svg
      template: GIT
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - PostgreSQL
      spec:
        source:
          source: GITHUB
          repo: 1166737063
          branch: master
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          PORT:
            default: "8080"
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          JWT_SECRET:
            default: ${JWT_SECRET}
          DISCORD_CLIENT_ID:
            default: ${DISCORD_CLIENT_ID}
          DISCORD_CLIENT_SECRET:
            default: ${DISCORD_CLIENT_SECRET}
          DISCORD_REDIRECT_URI:
            default: ${DISCORD_REDIRECT_URI}
          FRONTEND_URL:
            default: https://${PUBLIC_DOMAIN}
          ENVIRONMENT:
            default: production
  localization:
    zh-CN:
      description: >-
        高仿 iOS 风格手机模拟器 Web 应用，专为角色扮演和沉浸式社交模拟打造。
        集成 AI 生成内容，覆盖聊天、社交、娱乐、生活、工具五大模块，45+ 功能页面。
      readme: |-
        # fzsmphone

        高仿 iOS 风格手机模拟器 Web 应用，专为角色扮演和沉浸式社交模拟打造。

        ## 特性

        - iOS 风格 UI，45+ 功能页面
        - AI 驱动内容生成（OpenAI 兼容 API）
        - Discord OAuth2 身份验证
        - 五大模块：聊天、社交、娱乐、生活、工具

        ## 技术栈

        - 前端：Vue 3 + TypeScript + Vite + Pinia
        - 后端：Go 1.22 + Chi v5 + PostgreSQL 16
        - 认证：Discord OAuth2 + JWT

        ## 部署后配置

        1. 在 [Discord Developer Portal](https://discord.com/developers/applications) 创建应用
        2. 将 OAuth2 Redirect URI 设置为 `https://your-domain.zeabur.app/auth/callback`
        3. 在 Zeabur 环境变量中填入 Discord 相关配置

        更多信息：[GitHub 仓库](https://github.com/907606864-hub/fzsmphone)
