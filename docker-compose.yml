version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fzsmphone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fzsmphone
      POSTGRES_PASSWORD: fzsmphone_dev_123
      POSTGRES_DB: fzsmphone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fzsmphone"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fzsmphone-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://fzsmphone:fzsmphone_dev_123@postgres:5432/fzsmphone?sslmode=disable"
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_REDIRECT_URI: "http://localhost:3000/auth/callback"
      FRONTEND_URL: "http://localhost:3000"
      ENV: "development"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
