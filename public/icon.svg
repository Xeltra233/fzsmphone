<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Phone body -->
  <rect x="156" y="72" width="200" height="368" rx="28" fill="#0f0a2a" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>

  <!-- Screen -->
  <rect x="170" y="108" width="172" height="296" rx="8" fill="url(#screen)"/>

  <!-- Notch -->
  <rect x="222" y="78" width="68" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>

  <!-- Chat bubble 1 (left, blue) -->
  <rect x="186" y="148" width="100" height="36" rx="18" fill="url(#bubble1)" filter="url(#glow)"/>
  <!-- Dots in bubble 1 -->
  <circle cx="214" cy="166" r="4" fill="rgba(255,255,255,0.9)"/>
  <circle cx="232" cy="166" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="250" cy="166" r="4" fill="rgba(255,255,255,0.5)"/>

  <!-- Chat bubble 2 (right, purple) -->
  <rect x="226" y="200" width="100" height="36" rx="18" fill="url(#bubble2)" filter="url(#glow)"/>
  <!-- Lines in bubble 2 -->
  <rect x="244" y="213" width="64" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="244" y="222" width="44" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Chat bubble 3 (left, blue, smaller) -->
  <rect x="186" y="252" width="80" height="36" rx="18" fill="url(#bubble1)" opacity="0.8"/>
  <rect x="202" y="265" width="48" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="202" y="274" width="32" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Input bar at bottom of screen -->
  <rect x="178" y="360" width="156" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <circle cx="316" cy="376" r="10" fill="url(#bubble1)"/>
  <path d="M312 376 L319 376 M316 372 L316 380" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Home indicator -->
  <rect x="224" y="418" width="64" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>

  <!-- Decorative dots (signal strength feel) -->
  <circle cx="108" cy="108" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="404" cy="108" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="108" cy="404" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="404" cy="404" r="6" fill="rgba(255,255,255,0.15)"/>
</svg>
